<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    @font-face {
      font-family: 'Space Grotesk';
      font-weight: 300 700;
      src: url('../fonts/space-grotesk.woff2') format('woff2');
    }
    body {
      width: 230px;
      margin: 0;
      padding: 18px 18px 14px;
      background: #030304;
      color: #e9e9e4;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 12px;
    }
    h1 {
      margin: 0 0 2px;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.35);
    }
    p.sub {
      margin: 0 0 14px;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(233, 233, 228, 0.4);
    }
    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px dotted rgba(233, 233, 228, 0.16);
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    label:last-of-type { border-bottom: none; }
    input[type='checkbox'] {
      appearance: none;
      width: 30px;
      height: 14px;
      margin: 0;
      border: 1px solid rgba(233, 233, 228, 0.35);
      border-radius: 8px;
      position: relative;
      cursor: pointer;
      background: transparent;
      transition: background 160ms ease;
    }
    input[type='checkbox']::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 3px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(233, 233, 228, 0.45);
      transition: left 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }
    input[type='checkbox']:checked::after {
      left: 17px;
      background: #fff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
    }
    p.sub.section {
      margin: 16px 0 8px;
      padding-top: 12px;
      border-top: 1px dotted rgba(233, 233, 228, 0.16);
    }
    input.text {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
      padding: 7px 9px;
      background: #0a0a0d;
      color: #e9e9e4;
      border: 1px dotted rgba(233, 233, 228, 0.3);
      border-radius: 2px;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.06em;
    }
    input.text:focus {
      outline: none;
      border-color: rgba(233, 233, 228, 0.7);
    }
    #syncStatus {
      min-height: 12px;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(233, 233, 228, 0.45);
    }
    footer {
      margin-top: 14px;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      color: rgba(233, 233, 228, 0.3);
    }
  </style>
</head>
<body>
  <h1>MA Styled</h1>
  <p class="sub">Hope Core</p>

  <label>Theme <input type="checkbox" id="enabled" /></label>
  <label>Starfield <input type="checkbox" id="stars" /></label>
  <label>The Dawn <input type="checkbox" id="dawn" /></label>
  <label>Grain <input type="checkbox" id="grain" /></label>
  <label>HUD <input type="checkbox" id="hud" /></label>
  <label>Motion <input type="checkbox" id="motion" /></label>

  <p class="sub section">Sync</p>
  <input type="text" id="syncUrl" class="text" placeholder="worker url" autocomplete="off" />
  <input type="password" id="syncToken" class="text" placeholder="token" autocomplete="off" />
  <div id="syncStatus"></div>

  <footer>· the light grows ·</footer>
  <script src="popup.js"></script>
</body>
</html>
